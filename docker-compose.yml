version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn viet_qa.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    environment:
      # Optional: enable GPU pass-through if testing on CUDA machines natively
      - NVIDIA_VISIBLE_DEVICES=all
      
  ui:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run viet_qa/src/ui/app.py --server.address 0.0.0.0
    volumes:
      - .:/app
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
